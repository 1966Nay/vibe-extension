<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VibeEscape Extractor</title>
  <!-- JSZip must be downloaded locally — run setup.ps1 first -->
  <script src="lib/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 290px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      padding: 18px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #7C3AED, #4F46E5);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: 0.01em;
    }

    .header-text p {
      font-size: 11px;
      color: #64748b;
      margin-top: 1px;
    }

    #status {
      font-size: 12px;
      line-height: 1.45;
      padding: 9px 11px;
      border-radius: 7px;
      margin-bottom: 12px;
      min-height: 40px;
      display: flex;
      align-items: center;
      background: #1a1a2e;
      color: #94a3b8;
      border: 1px solid #1e293b;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    #status.success { background: #052e16; color: #4ade80; border-color: #14532d; }
    #status.error   { background: #2d1111; color: #f87171; border-color: #7f1d1d; }
    #status.busy    { background: #1e1b4b; color: #a5b4fc; border-color: #312e81; }

    #extract-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #7C3AED, #4F46E5);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.15s;
    }

    #extract-btn:hover:not(:disabled) { opacity: 0.88; }
    #extract-btn:active:not(:disabled) { opacity: 0.75; }
    #extract-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #progress-wrap {
      display: none;
      margin-bottom: 12px;
    }

    #progress-track {
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7C3AED, #4F46E5);
      border-radius: 3px;
      transition: width 0.25s ease;
    }

    #progress-label {
      font-size: 10px;
      color: #64748b;
      text-align: right;
    }

    .footer {
      margin-top: 11px;
      font-size: 10px;
      color: #334155;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div class="header-text">
      <h1>VibeEscape Extractor</h1>
      <p>GHL AI Studio · vibe code editor</p>
    </div>
  </div>

  <div id="status">Ready — click to extract all project files.</div>

  <div id="progress-wrap">
    <div id="progress-track"><div id="progress-fill"></div></div>
    <div id="progress-label"></div>
  </div>

  <button id="extract-btn">⬇ Extract &amp; Download ZIP</button>

  <div class="footer">Reads the Pinia store inside the vibe iframe</div>

  <script src="popup.js"></script>
</body>
</html>
